name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Tests share a single Supabase test workspace and rely on
# clean-between-tests semantics. Concurrent runs would race on
# the same rows. Serialize all runs of this workflow; cancel
# any in-flight run when a newer one starts.
concurrency:
  group: tests
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        # All commands run from the tests/ subdirectory (where package.json
        # and playwright.config.ts live). Saves repeating `cd tests` everywhere.
        working-directory: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      # Playwright browser binaries are ~300MB and slow to download.
      # Cache them keyed on the Playwright version pinned in package-lock.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Even on cache hit, ensure system deps for chromium are present.
      # This is fast (no-op if already installed).
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run tests
        env:
          # Real Supabase project (test workspace, not prod workspace)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          TEST_WORKSPACE_ID: ${{ secrets.TEST_WORKSPACE_ID }}
          # Test users (must already exist as confirmed accounts)
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_REP_EMAIL: ${{ secrets.TEST_REP_EMAIL }}
          TEST_REP_PASSWORD: ${{ secrets.TEST_REP_PASSWORD }}
          # Mark CI so playwright.config.ts can apply CI-only behaviors
          # (e.g. forbidOnly: true). Set automatically by GitHub Actions
          # but kept explicit for clarity.
          CI: true
        run: npm test

      # Always upload the HTML report on failure so we can inspect what
      # broke. Skipped on success to save artifact storage.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14
